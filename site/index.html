<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Istinto Puro — solver</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <select id="langsel" aria-label="Lingua / Language">
    <option value="it">IT</option><option value="en">EN</option>
  </select>
  <h1>Istinto Puro</h1>
  <p class="sub" id="tagline">Scegli due o più squadre — chi ha giocato in tutte?</p>
</header>
<main>
  <div id="picker">
    <div id="chips"></div>
    <div id="searchwrap">
      <input id="search" type="text" autocomplete="off" spellcheck="false"
             placeholder="Aggiungi una squadra…" disabled>
      <ul id="suggestions" hidden></ul>
    </div>
  </div>
  <div id="controls">
    <span class="ctl"><label id="l-sort" for="sortsel">Ordina per</label>
      <select id="sortsel">
        <option value="apps">presenze</option>
        <option value="goals">gol</option>
        <option value="birth">nascita</option>
      </select><button id="dirbtn">↓</button></span>
    <span class="ctl"><label id="l-born" for="byfrom">Nati</label>
      <input id="byfrom" type="number" min="1850" max="2035" placeholder="dal">–<input
       id="byto" type="number" min="1850" max="2035" placeholder="al"></span>
    <label class="ctl"><input id="nozero" type="checkbox"> <span id="l-nozero">nascondi 0 presenze</span></label>
  </div>
  <div id="status">Caricamento dati…</div>
  <ul id="results"></ul>
</main>
<footer id="foot">dati: <a href="https://www.wikidata.org">Wikidata</a> · foto: <a href="https://commons.wikimedia.org">Wikimedia Commons</a> · <a href="https://github.com/marcocosta97/istintopuro/blob/master/LICENSE">MIT</a> · <a href="https://github.com/marcocosta97/istintopuro">GitHub</a></footer>
<script src="app.js"></script>
</body>
</html>
