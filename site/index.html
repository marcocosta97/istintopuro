<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Istinto Puro — solver</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link rel="stylesheet" href="style.css?v=__V__">
</head>
<body>
<header>
  <div class="brand">
    <span class="mark" aria-hidden="true">⚽</span>
    <div>
      <h1><span>Istinto</span> <span class="accent">Puro</span></h1>
      <p class="sub" id="tagline">Scegli due o più squadre — chi ha giocato in tutte?</p>
    </div>
  </div>
  <div class="htools">
    <button id="aboutbtn" aria-label="info">?</button>
    <select id="langsel" aria-label="Lingua / Language">
      <option value="it">IT</option><option value="en">EN</option>
    </select>
  </div>
</header>
<main>
  <div id="picker">
    <div id="chips"></div>
    <div id="searchwrap">
      <input id="search" type="text" autocomplete="off" spellcheck="false"
             placeholder="Aggiungi una squadra…" disabled>
      <button id="browsebtn" type="button" aria-controls="browse" aria-expanded="false" disabled>▾</button>
      <ul id="suggestions" hidden></ul>
    </div>
    <div id="browse" hidden>
      <button id="br-back" type="button" hidden>‹</button>
      <ul></ul><ul></ul><ul></ul>
    </div>
  </div>
  <div id="controls">
    <button id="advtoggle" type="button" aria-controls="advbody" aria-expanded="false"><span id="l-adv">Filtri</span></button>
    <span class="ctl"><label id="l-sort" for="sortsel">Ordina per</label>
      <select id="sortsel">
        <option value="apps">presenze</option>
        <option value="goals">gol</option>
        <option value="birth">nascita</option>
      </select><button id="dirbtn" aria-label="direzione">↓</button></span>
  </div>
  <div id="advbody" hidden>
    <span class="ctl"><label id="l-born" for="byfrom">Nati</label>
      <input id="byfrom" type="number" min="1850" max="2035" placeholder="dal">–<input
       id="byto" type="number" min="1850" max="2035" placeholder="al"></span>
    <span class="ctl">
      <label><input id="nozero" type="checkbox"> <span id="l-nozero">nascondi 0 presenze</span></label>
      <button class="hint" id="hint-nozero" type="button" aria-expanded="false">?<span class="tip" id="tip-nozero"></span></button>
    </span>
  </div>
  <div id="status" aria-live="polite">Caricamento dati…</div>
  <ul id="results"></ul>
</main>
<dialog id="about">
  <h2>Istinto Puro — solver</h2>
  <p id="abouttext"></p>
  <p id="aboutleagues"></p>
  <p id="aboutdisclaimer" class="disclaimer"></p>
  <form method="dialog"><button>OK</button></form>
</dialog>
<footer id="foot">dati: <a href="https://www.wikidata.org">Wikidata</a> · foto: <a href="https://commons.wikimedia.org">Wikimedia Commons</a> · <a href="https://github.com/marcocosta97/istintopuro/blob/master/LICENSE">MIT</a> · <a href="https://github.com/marcocosta97/istintopuro">GitHub</a></footer>
<script src="app.js?v=__V__"></script>
</body>
</html>
