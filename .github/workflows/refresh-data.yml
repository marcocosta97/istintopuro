name: Weekly data refresh

on:
  schedule:
    - cron: "0 2 * * 1"   # Mondays 02:00 UTC (deploys ~02:40 UTC, off-peak) — the quiz
                          # regenerates from the live dataset, so refresh in the quiet hours
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write   # commit the refreshed dataset
  pages: write      # publish to GitHub Pages
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install requests==2.32.3

      # re-runs of a failed job resume its checkpoints; keys are scoped to the
      # run id, so a new weekly run always starts from a clean fetch
      - uses: actions/cache/restore@v4
        with:
          path: data
          key: checkpoints-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: checkpoints-${{ github.run_id }}-

      # the validate stage aborts the job (no commit, no deploy) if the new
      # index is malformed or shrank >3% vs the currently deployed one
      - name: Refresh dataset from Wikidata (~40 min, ~600 throttled queries)
        run: |
          git show HEAD:site/data/index.json > /tmp/index-baseline.json
          VALIDATE_BASELINE=/tmp/index-baseline.json python3 pipeline/pipeline.py

      - uses: actions/cache/save@v4
        if: always()   # keep partial checkpoints even when a stage failed
        with:
          path: data
          key: checkpoints-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit refreshed dataset if it changed
        run: |
          git config user.name "istintopuro-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data
          if git diff --cached --quiet; then
            echo "No dataset changes this week."
          else
            git commit -m "Weekly data refresh ($(date -u +%Y-%m-%d))"
            git push origin HEAD:master
          fi

      # code assets are unchanged by a data refresh, so reuse the trigger SHA
      - name: Stamp asset version
        run: sed -i "s/__V__/${GITHUB_SHA}/g" site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
