name: Weekly data refresh

on:
  schedule:
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write   # commit the refreshed dataset
  pages: write      # publish to GitHub Pages
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests

      - name: Refresh dataset from Wikidata (~40 min, ~600 throttled queries)
        run: python3 pipeline/pipeline.py

      - name: Commit refreshed dataset if it changed
        run: |
          git config user.name "istintopuro-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data
          if git diff --cached --quiet; then
            echo "No dataset changes this week."
          else
            git commit -m "Weekly data refresh ($(date -u +%Y-%m-%d))"
            git push origin HEAD:master
          fi

      # code assets are unchanged by a data refresh, so reuse the trigger SHA
      - name: Stamp asset version
        run: sed -i "s/__V__/${GITHUB_SHA}/g" site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
